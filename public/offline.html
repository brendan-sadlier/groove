<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Groove — Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        background: #fafafa;
        color: #171717;
      }
      .card {
        text-align: center;
        padding: 2rem;
        max-width: 20rem;
      }
      h1 {
        font-size: 1.25rem;
        margin: 0 0 0.5rem;
      }
      p {
        color: #71717a;
        margin: 0 0 1.25rem;
        line-height: 1.5;
      }
      button {
        font: inherit;
        padding: 0.6rem 1.4rem;
        border-radius: 0.5rem;
        border: 0;
        background: #006039;
        color: #fff;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background: #171717;
          color: #fafafa;
        }
        button {
          background: #006039;
          color: #fff;
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>You're offline</h1>
      <p>
        Groove needs a connection to load. Check your network and try again.
      </p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
